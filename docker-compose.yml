services:
  postgres:
    image: postgres:15-alpine
    container_name: airline-fares-db
    environment:
      POSTGRES_DB: airlinefares
      POSTGRES_USER: airlineuser
      POSTGRES_PASSWORD: airlinepass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
      - ./seed:/seed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airlineuser -d airlinefares"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
