name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment directory under infra/terraform/environments
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AZURE_CORE_OUTPUT: none
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_BACKEND_RESOURCE_GROUP_NAME: ${{ vars.TF_BACKEND_RESOURCE_GROUP_NAME }}
      TF_BACKEND_STORAGE_ACCOUNT_NAME: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT_NAME }}
      TF_BACKEND_CONTAINER_NAME: ${{ vars.TF_BACKEND_CONTAINER_NAME }}
      TF_BACKEND_STATE_KEY: ${{ vars.TF_BACKEND_STATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow inputs
        run: |
          set -euo pipefail
          test -d "infra/terraform/environments/${{ inputs.environment }}"
          test -n "${ARM_CLIENT_ID}"
          test -n "${ARM_TENANT_ID}"
          test -n "${ARM_SUBSCRIPTION_ID}"
          test -n "${TF_BACKEND_RESOURCE_GROUP_NAME}"
          test -n "${TF_BACKEND_STORAGE_ACCOUNT_NAME}"
          test -n "${TF_BACKEND_CONTAINER_NAME}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write temporary backend config
        working-directory: infra/terraform/environments/${{ inputs.environment }}
        run: |
          cat > backend_override.tf <<'EOF'
          terraform {
            backend "azurerm" {}
          }
          EOF

      - name: Terraform init
        working-directory: infra/terraform/environments/${{ inputs.environment }}
        run: |
          set -euo pipefail
          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER_NAME}" \
            -backend-config="key=${TF_BACKEND_STATE_KEY:-${{ inputs.environment }}.tfstate}"

      - name: Terraform apply
        working-directory: infra/terraform/environments/${{ inputs.environment }}
        run: terraform apply -input=false -auto-approve
